# fly.toml app configuration file generated for cultivate-server on 2025-04-15T00:00:24-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'cultivate-server'
primary_region = 'mia'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  # Keep costs low while Cultivate is low-traffic. Fly will cold-start the
  # server on the first request after idle time.
  min_machines_running = 0
  processes = ['app']

[[vm]]
  # Live server RSS was ~250MB total on 1GB; 512MB is the safer cheap floor for
  # Node + Prisma. Try 256MB only after production memory proves it is stable.
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
